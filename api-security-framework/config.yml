# API Security Testing Framework - Configuration

target:
  # Use 'demo' to spin up the bundled Flask app, or provide a real URL
  mode: demo                        # demo | external
  url: http://localhost:5000        # used when mode is 'external'

auth:
  enabled: true
  type: jwt                         # jwt | session | both | none
  jwt:
    header: Authorization
    prefix: "Bearer "
    token: ""                       # set via env var API_JWT_TOKEN or here
  session:
    cookie_name: session
    cookie_value: ""                # set via env var API_SESSION_COOKIE or here

scan:
  ajax_spider: false                # enable for JS-heavy APIs
  active_scan: true
  scan_timeout: 120                 # seconds
  severity_threshold: medium        # low | medium | high | critical
                                    # findings below this level are suppressed

report:
  output_dir: reports
  filename: security_report.html
  include_passing: false            # include endpoints with no findings

zap:
  host: localhost
  port: 8090
  api_key: changeme                 # match with ZAP startup -config api.key=
